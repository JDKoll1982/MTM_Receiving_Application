# list of languages for which language servers are started; choose from:
#   al               bash             clojure          cpp              csharp           csharp_omnisharp
#   dart             elixir           elm              erlang           fortran          go
#   haskell          java             julia            kotlin           lua              markdown
#   nix              perl             php              python           python_jedi      r
#   rego             ruby             ruby_solargraph  rust             scala            swift
#   terraform        typescript       typescript_vts   yaml             zig
# Note:
#   - For C, use cpp
#   - For JavaScript, use typescript
# Special requirements:
#   - csharp: Requires the presence of a .sln file in the project folder.
# When using multiple languages, the first language server that supports a given file will be used for that file.
# The first language is the default language and the respective language server will be used as a fallback.
# Note that when using the JetBrains backend, language servers are not used and this list is correspondingly ignored.
languages:
  - csharp

# the encoding used by text files in the project
# For a list of possible encodings, see https://docs.python.org/3.11/library/codecs.html#standard-encodings
encoding: "utf-8"

# whether to use the project's gitignore file to ignore files
# Added on 2025-04-07
ignore_all_files_in_gitignore: true

# list of additional paths to ignore
# same syntax as gitignore, so you can use * and **
# Was previously called `ignored_dirs`, please update your config if you are using that.
# Added (renamed) on 2025-04-07
ignored_paths: []

# whether the project is in read-only mode
# If set to true, all editing tools will be disabled and attempts to use them will result in an error
# Added on 2025-04-18
read_only: false

# list of tool names to exclude. We recommend not excluding any tools, see the readme for more details.
# Below is the complete list of tools for convenience.
# To make sure you have the latest list of tools, and to view their descriptions,
# execute `uv run scripts/print_tool_overview.py`.
#
#  * `activate_project`: Activates a project by name.
#  * `check_onboarding_performed`: Checks whether project onboarding was already performed.
#  * `create_text_file`: Creates/overwrites a file in the project directory.
#  * `delete_lines`: Deletes a range of lines within a file.
#  * `delete_memory`: Deletes a memory from Serena's project-specific memory store.
#  * `execute_shell_command`: Executes a shell command.
#  * `find_referencing_code_snippets`: Finds code snippets in which the symbol at the given location is referenced.
#  * `find_referencing_symbols`: Finds symbols that reference the symbol at the given location (optionally filtered by type).
#  * `find_symbol`: Performs a global (or local) search for symbols with/containing a given name/substring (optionally filtered by type).
#  * `get_current_config`: Prints the current configuration of the agent, including the active and available projects, tools, contexts, and modes.
#  * `get_symbols_overview`: Gets an overview of the top-level symbols defined in a given file.
#  * `initial_instructions`: Gets the initial instructions for the current project.
#     Should only be used in settings where the system prompt cannot be set,
#     e.g. in clients you have no control over, like Claude Desktop.
#  * `insert_after_symbol`: Inserts content after the end of the definition of a given symbol.
#  * `insert_at_line`: Inserts content at a given line in a file.
#  * `insert_before_symbol`: Inserts content before the beginning of the definition of a given symbol.
#  * `list_dir`: Lists files and directories in the given directory (optionally with recursion).
#  * `list_memories`: Lists memories in Serena's project-specific memory store.
#  * `onboarding`: Performs onboarding (identifying the project structure and essential tasks, e.g. for testing or building).
#  * `prepare_for_new_conversation`: Provides instructions for preparing for a new conversation (in order to continue with the necessary context).
#  * `read_file`: Reads a file within the project directory.
#  * `read_memory`: Reads the memory with the given name from Serena's project-specific memory store.
#  * `remove_project`: Removes a project from the Serena configuration.
#  * `replace_lines`: Replaces a range of lines within a file with new content.
#  * `replace_symbol_body`: Replaces the full definition of a symbol.
#  * `restart_language_server`: Restarts the language server, may be necessary when edits not through Serena happen.
#  * `search_for_pattern`: Performs a search for a pattern in the project.
#  * `summarize_changes`: Provides instructions for summarizing the changes made to the codebase.
#  * `switch_modes`: Activates modes by providing a list of their names
#  * `think_about_collected_information`: Thinking tool for pondering the completeness of collected information.
#  * `think_about_task_adherence`: Thinking tool for determining whether the agent is still on track with the current task.
#  * `think_about_whether_you_are_done`: Thinking tool for determining whether the task is truly completed.
#  * `write_memory`: Writes a named memory (for future reference) to Serena's project-specific memory store.
excluded_tools: []

# initial prompt for the project. It will always be given to the LLM upon activating the project
# (contrary to the memories, which are loaded on demand).
initial_prompt: |
  You are working on the **MTM Receiving Application** — a WinUI 3 / .NET 8 desktop application
  for manufacturing receiving operations. It uses strict MVVM with CommunityToolkit.Mvvm,
  MySQL 5.7 (READ/WRITE via stored procedures), and SQL Server/Infor Visual (READ ONLY).

  ## Before Making ANY Changes

  Read these memories in order:
  1. `read_memory("forbidden_practices")` — absolute rules; violations break the system
  2. `read_memory("architectural_patterns")` — MVVM layer flow and separation rules
  3. `read_memory("dao_best_practices")` — Model_Dao_Result pattern and stored procedure usage

  For additional context as needed:
  - `read_memory("mvvm_guide")` — full ViewModel/Service/DAO walkthrough with examples
  - `read_memory("coding_standards")` — naming conventions and C# style rules
  - `read_memory("infor_visual_constraints")` — SQL Server READ ONLY enforcement
  - `read_memory("error_handling_guide")` — IService_ErrorHandler usage
  - `read_memory("xaml_binding_patterns")` — x:Bind patterns; never use runtime Binding

  The authoritative source of truth is `.github/copilot-instructions.md`.

  ## Critical Architecture Rules (Summary)

  **FORBIDDEN — these will break the system:**
  - ViewModels calling DAOs directly (must go through Service layer)
  - Static DAO classes (all DAOs must be instance-based)
  - DAOs throwing exceptions (return Model_Dao_Result with error details)
  - Raw SQL in C# for MySQL (use stored procedures ONLY)
  - Write operations to SQL Server/Infor Visual (READ ONLY — no INSERT/UPDATE/DELETE)
  - Runtime `{Binding}` in XAML (use compile-time `{x:Bind}` only)
  - Business logic in `.xaml.cs` code-behind

  **REQUIRED layer flow:**
  View (XAML) → ViewModel → Service → DAO → Database

  ## Build Verification

  After making changes, verify with:
  - `dotnet build MTM_Receiving_Application.slnx` — must succeed before considering any task done
  - `dotnet test MTM_Receiving_Application.slnx` — must pass for functional changes

  ## Key Tech Stack

  - .NET 8, C# 12, WinUI 3 (Windows App SDK 1.6+)
  - CommunityToolkit.Mvvm (ObservableProperty, RelayCommand)
  - MySQL 5.7 via MySqlConnector — stored procedures only
  - SQL Server (Infor Visual MTMFG) — ApplicationIntent=ReadOnly
  - xUnit + FluentAssertions for tests

  ## Follow instructions in .github/prompts/noob-mode.prompt.md when returning results to the user, especially for large or complex changes.

# the name by which the project can be referenced within Serena
project_name: "MTM_Receiving_Application"

# list of tools to include that would otherwise be disabled (particularly optional tools that are disabled by default)
# Rationale for each included tool:
#   execute_shell_command : Enables `dotnet build` and `dotnet test` for build verification after edits.
#                           Required even in ide context where shell tools are normally suppressed.
#   think_about_collected_information : Reduces token waste by prompting the agent to verify it has
#                           enough context before generating code in large multi-file refactors.
#   think_about_task_adherence : Keeps the agent on-track when working across many MVVM layers.
#   think_about_whether_you_are_done : Prevents premature task completion — critical when
#                           architecture validation searches must pass before closing a task.
#   summarize_changes     : Produces a structured diff summary at end of session; helps with
#                           memory-bank updates and PR descriptions.
#   prepare_for_new_conversation : Enables clean session hand-off with context preserved in memories.
included_optional_tools:
  - execute_shell_command
  - think_about_collected_information
  - think_about_task_adherence
  - think_about_whether_you_are_done
  - summarize_changes
  - prepare_for_new_conversation

# list of mode names to that are always to be included in the set of active modes
# The full set of modes to be activated is base_modes + default_modes.
# If the setting is undefined, the base_modes from the global configuration (serena_config.yml) apply.
# Otherwise, this setting overrides the global configuration.
# Set this to [] to disable base modes for this project.
# Set this to a list of mode names to always include the respective modes for this project.
base_modes:
  - editing
  - interactive

# list of mode names that are to be activated by default.
# The full set of modes to be activated is base_modes + default_modes.
# If the setting is undefined, the default_modes from the global configuration (serena_config.yml) apply.
# Otherwise, this overrides the setting from the global configuration (serena_config.yml).
# This setting can, in turn, be overridden by CLI parameters (--mode).
default_modes:

# fixed set of tools to use as the base tool set (if non-empty), replacing Serena's default set of tools.
# This cannot be combined with non-empty excluded_tools or included_optional_tools.
fixed_tools: []

# time budget (seconds) per tool call for the retrieval of additional symbol information
# such as docstrings or parameter information.
# This overrides the corresponding setting in the global configuration; see the documentation there.
# If null or missing, use the setting from the global configuration.
symbol_info_budget:

# The language backend to use for this project.
# If not set, the global setting from serena_config.yml is used.
# Valid values: LSP, JetBrains
# Note: the backend is fixed at startup. If a project with a different backend
# is activated post-init, an error will be returned.
language_backend: LSP

# list of regex patterns which, when matched, mark a memory entry as read‑only.
# Extends the list from the global configuration, merging the two lists.
# constitution_summary and forbidden_practices are protected from accidental AI edits;
# they are the immutable architectural constraints for this project.
read_only_memory_patterns:
  - "constitution_summary"
  - "forbidden_practices"

# line ending convention to use when writing source files.
# Possible values: unset (use global setting), "lf", "crlf", or "native" (platform default)
# This does not affect Serena's own files (e.g. memories and configuration files), which always use native line endings.
# Set to crlf for Windows team consistency; prevents git diff pollution from line ending changes.
line_ending: "crlf"
